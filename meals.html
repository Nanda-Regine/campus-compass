<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Meal Prep — Campus Compass</title>
  <link rel="stylesheet" href="shared.css"/>
  <style>
    .day-card {
      background: var(--dark-surface);
      border: 1px solid var(--dark-border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      margin-bottom: 12px;
    }
    .day-header {
      padding: 12px 16px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--dark-border);
    }
    .day-name {
      font-family: var(--font-display); font-size: 0.875rem; font-weight: 800; color: white;
    }
    .day-body { padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }
    .meal-slot {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 10px; border-radius: 8px;
      background: var(--dark-bg); border: 1px dashed var(--dark-border);
      cursor: pointer; transition: all 0.15s; min-height: 40px;
    }
    .meal-slot:hover { border-color: var(--teal); background: var(--teal-dim); }
    .meal-slot.filled { border-style: solid; border-color: var(--dark-border2); background: var(--dark-surface2); cursor: default; }
    .meal-slot-label { font-family: var(--font-mono); font-size: 0.6rem; color: var(--text-light3); letter-spacing: 0.08em; text-transform: uppercase; width: 60px; flex-shrink: 0; }
    .meal-slot-name  { font-size: 0.8rem; color: white; flex: 1; }
    .meal-slot-empty { font-size: 0.75rem; color: var(--text-light3); flex: 1; }

    .grocery-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 0; border-bottom: 1px solid var(--dark-border);
    }
    .grocery-item:last-child { border-bottom: none; }
    .grocery-check {
      width: 20px; height: 20px;
      border: 2px solid var(--dark-border2);
      border-radius: 5px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all 0.15s;
    }
    .grocery-check.checked { background: var(--teal); border-color: var(--teal); color: white; font-size: 0.7rem; }
    .grocery-name { flex: 1; font-size: 0.875rem; color: white; }
    .grocery-name.checked { text-decoration: line-through; color: var(--text-light3); }
    .grocery-qty  { font-family: var(--font-mono); font-size: 0.65rem; color: var(--text-light3); }

    .recipe-card {
      background: var(--dark-surface);
      border: 1px solid var(--dark-border);
      border-radius: var(--radius-lg); padding: 16px;
      margin-bottom: 12px;
    }
    .recipe-name  { font-family: var(--font-display); font-size: 0.95rem; font-weight: 800; color: white; margin-bottom: 4px; }
    .recipe-meta  { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
    .recipe-steps { font-size: 0.8rem; color: var(--text-light2); line-height: 1.7; white-space: pre-line; }

    .tab-bar { display: flex; gap: 2px; padding: 0 16px; border-bottom: 1px solid var(--dark-border); }
    .tab-btn {
      padding: 14px 16px; border: none; background: none;
      font-family: var(--font-display); font-size: 0.78rem; font-weight: 700;
      color: var(--text-light3); cursor: pointer;
      border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s;
    }
    .tab-btn.active { color: var(--teal-light); border-bottom-color: var(--teal); }
    .tab-panel { display: none; padding: 16px; }
    .tab-panel.active { display: block; }
  </style>
</head>
<body>

<div id="drawer-container"></div>

<div class="module-page">

  <div class="topbar topbar-dark">
    <button class="topbar-menu-btn" onclick="openDrawer()">☰</button>
    <span class="topbar-title">🍲 Meal Prep</span>
    <button class="topbar-action topbar-dark" onclick="openModal('add-grocery-modal')">🛒</button>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('weekly')">Weekly Plan</button>
    <button class="tab-btn" onclick="switchTab('grocery')">Grocery List</button>
    <button class="tab-btn" onclick="switchTab('recipes')">Student Recipes</button>
  </div>

  <!-- WEEKLY PLAN -->
  <div class="tab-panel active" id="tab-weekly">

    <!-- Food budget mini-widget -->
    <div style="background:var(--dark-surface2);border:1px solid var(--dark-border);border-radius:var(--radius);padding:12px 16px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;">
      <div>
        <div style="font-family:var(--font-mono);font-size:0.58rem;color:var(--text-light3);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:3px;">Food Budget</div>
        <div style="font-family:var(--font-display);font-size:1.1rem;font-weight:800;color:white;" id="food-budget-display">—</div>
      </div>
      <div style="text-align:right;">
        <div style="font-family:var(--font-mono);font-size:0.58rem;color:var(--text-light3);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:3px;">Spent on food</div>
        <div style="font-family:var(--font-display);font-size:1.1rem;font-weight:800;color:var(--coral-light);" id="food-spent-display">—</div>
      </div>
    </div>

    <div id="weekly-plan"></div>
  </div>

  <!-- GROCERY LIST -->
  <div class="tab-panel" id="tab-grocery">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <span style="font-family:var(--font-mono);font-size:0.65rem;color:var(--text-light3);" id="grocery-count">0 items</span>
      <button class="btn btn-outline-light btn-sm" onclick="clearChecked()">Clear checked</button>
    </div>
    <div id="grocery-list"></div>
    <button class="btn btn-teal btn-full" style="margin-top:12px;" onclick="openModal('add-grocery-modal')">
      + Add to Grocery List
    </button>
  </div>

  <!-- STUDENT RECIPES -->
  <div class="tab-panel" id="tab-recipes">
    <div style="font-family:var(--font-mono);font-size:0.65rem;color:var(--text-light3);margin-bottom:16px;line-height:1.6;">
      Budget-friendly recipes for South African students. Under R50 per meal.
    </div>
    <div id="recipes-list"></div>
    <div id="ai-recipe-section" style="margin-top:16px;">
      <div style="background:var(--dark-surface2);border:1px solid rgba(13,148,136,0.25);border-radius:var(--radius-lg);padding:16px;">
        <div style="font-family:var(--font-mono);font-size:0.62rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--teal-light);margin-bottom:10px;">✨ AI Recipe Generator</div>
        <div class="form-group">
          <label class="form-label form-label-dark">What do you have in your kitchen?</label>
          <input type="text" class="form-input form-input-dark" id="ai-ingredients"
            placeholder="e.g. eggs, rice, onion, tomato, spice" />
        </div>
        <button class="btn btn-teal btn-full" onclick="generateRecipe()">Generate Student Recipe</button>
        <div id="ai-recipe-output" style="display:none;margin-top:14px;font-size:0.84rem;color:var(--text-light2);line-height:1.7;white-space:pre-line;border-top:1px solid var(--dark-border);padding-top:14px;"></div>
      </div>
    </div>
  </div>

</div>

<!-- ADD MEAL MODAL -->
<div class="modal-overlay" id="add-meal-modal" style="display:none;" onclick="if(event.target===this)closeModal('add-meal-modal')">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title">Add Meal</span>
      <button class="btn btn-ghost-light" onclick="closeModal('add-meal-modal')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="meal-day" />
      <input type="hidden" id="meal-slot" />
      <div style="font-family:var(--font-mono);font-size:0.65rem;color:var(--text-light3);margin-bottom:12px;" id="meal-slot-label"></div>
      <div class="form-group">
        <label class="form-label form-label-dark">Meal Name</label>
        <input type="text" class="form-input form-input-dark" id="meal-name" placeholder="e.g. Pap en vleis, Rice and chicken…" />
      </div>
      <div class="form-group">
        <label class="form-label form-label-dark">Approx. Cost (R)</label>
        <input type="number" class="form-input form-input-dark" id="meal-cost" placeholder="e.g. 25" min="0" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline-light btn-sm" onclick="closeModal('add-meal-modal')">Cancel</button>
      <button class="btn btn-teal" onclick="saveMeal()">Add Meal</button>
    </div>
  </div>
</div>

<!-- ADD GROCERY MODAL -->
<div class="modal-overlay" id="add-grocery-modal" style="display:none;" onclick="if(event.target===this)closeModal('add-grocery-modal')">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title">Add to Grocery List</span>
      <button class="btn btn-ghost-light" onclick="closeModal('add-grocery-modal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label form-label-dark">Item *</label>
        <input type="text" class="form-input form-input-dark" id="gr-item" placeholder="e.g. Onions, Rice 2kg…" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label form-label-dark">Quantity</label>
          <input type="text" class="form-input form-input-dark" id="gr-qty" placeholder="e.g. 1kg, 6-pack" />
        </div>
        <div class="form-group">
          <label class="form-label form-label-dark">Est. Price (R)</label>
          <input type="number" class="form-input form-input-dark" id="gr-price" placeholder="0" min="0" />
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline-light btn-sm" onclick="closeModal('add-grocery-modal')">Cancel</button>
      <button class="btn btn-teal" onclick="saveGroceryItem()">Add Item</button>
    </div>
  </div>
</div>

<script src="shared.js"></script>
<script>
  requireSetup();
  document.getElementById('drawer-container').innerHTML = renderDrawer('meals');

  const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  const MEAL_SLOTS = ['Breakfast','Lunch','Supper','Snack'];

  const STUDENT_RECIPES = [
    {
      name: 'Varsity Egg Fried Rice',
      cost: 'Under R20', time: '15 min', servings: '1',
      tags: ['Protein','Quick','Budget'],
      steps: `Ingredients: 1 cup cooked rice, 2 eggs, ½ onion, 1 tomato, salt, pepper, oil

1. Heat oil in pan, fry diced onion until golden.
2. Add diced tomato, stir for 2 minutes.
3. Push aside, crack eggs in, scramble.
4. Mix everything with rice.
5. Season with salt, pepper, and a splash of soy sauce if available.`
    },
    {
      name: 'Pap & Chakalaka (Classic)',
      cost: 'Under R15', time: '20 min', servings: '2',
      tags: ['SA Classic','Filling','Veg-friendly'],
      steps: `Ingredients: 1 cup pap (maize meal), water, salt, 1 can chakalaka / baked beans

1. Boil salted water (2 cups).
2. Slowly pour in maize meal, stirring constantly.
3. Reduce heat, cover, cook 10–15 min until firm.
4. Warm chakalaka in a separate pot.
5. Serve pap with chakalaka on the side.`
    },
    {
      name: 'Stokvel Pasta Bake',
      cost: 'Under R35', time: '25 min', servings: '3',
      tags: ['Batch cook','High carb','Sharing'],
      steps: `Ingredients: 200g pasta, 1 tin tomatoes, ½ onion, garlic, mixed herbs, grated cheese

1. Boil pasta until cooked. Drain.
2. Fry onion and garlic until soft.
3. Add tin tomatoes + herbs, simmer 5 min.
4. Mix pasta into sauce, pour into baking dish.
5. Top with grated cheese.
6. Bake 15 min at 180°C until golden.`
    },
    {
      name: 'Campus Tuna Sandwich Stack',
      cost: 'Under R25', time: '5 min', servings: '1',
      tags: ['No-cook','Protein','Quick'],
      steps: `Ingredients: 2 slices bread, 1 tin tuna (R12 at Shoprite), mayo, tomato, lettuce if available

1. Drain tuna, mix with a spoon of mayo.
2. Spread on bread, layer with sliced tomato.
3. Add lettuce or cucumber if you have it.
4. Season with salt and pepper.

Pro tip: Add a squeeze of lemon if available — changes the whole thing.`
    },
    {
      name: 'Dorm Room Instant Noodle Upgrade',
      cost: 'Under R15', time: '8 min', servings: '1',
      tags: ['Dorm life','Quick','Customisable'],
      steps: `Ingredients: 1 packet 2-min noodles, 1 egg, ½ onion, leftover veggies, any hot sauce

1. Boil noodles as per packet (don't overcook).
2. While draining, fry onion quickly.
3. Crack egg into same pan, scramble.
4. Add drained noodles + half the spice sachet.
5. Toss everything together. Add hot sauce.

This is 10x better than plain noodles and costs almost nothing extra.`
    },
  ];

  function switchTab(name) {
    ['weekly','grocery','recipes'].forEach((t,i) => {
      document.querySelectorAll('.tab-btn')[i].classList.toggle('active', t===name);
      document.getElementById(`tab-${t}`).classList.toggle('active', t===name);
    });
    if (name==='weekly')  renderWeekly();
    if (name==='grocery') renderGrocery();
    if (name==='recipes') renderRecipes();
  }

  function renderWeekly() {
    const plan = Meals.plan();
    const budget = Budget.get();
    const foodSpent = (budget.spent||[]).filter(e=>e.category==='Food').reduce((s,e)=>s+Number(e.amount),0);
    const foodBudget = Number(budget.foodBudget) || 0;

    document.getElementById('food-budget-display').textContent = foodBudget>0 ? fmt.currency(foodBudget) : 'Not set';
    document.getElementById('food-spent-display').textContent  = fmt.currency(foodSpent);

    const container = document.getElementById('weekly-plan');
    container.innerHTML = DAYS.map(day => {
      const dayMeals = plan.filter(m=>m.day===day);
      const slots = MEAL_SLOTS.map(slot => {
        const meal = dayMeals.find(m=>m.slot===slot);
        if (meal) {
          return `<div class="meal-slot filled">
            <span class="meal-slot-label">${slot}</span>
            <span class="meal-slot-name">${meal.name}</span>
            ${meal.cost ? `<span style="font-family:var(--font-mono);font-size:0.58rem;color:var(--teal-light);">R${meal.cost}</span>` : ''}
            <button onclick="removeMealEntry('${meal.id}')" style="background:none;border:none;color:var(--text-light3);cursor:pointer;font-size:0.75rem;flex-shrink:0;">✕</button>
          </div>`;
        }
        return `<div class="meal-slot" onclick="openAddMeal('${day}','${slot}')">
          <span class="meal-slot-label">${slot}</span>
          <span class="meal-slot-empty">Tap to add</span>
        </div>`;
      }).join('');

      const dayTotal = dayMeals.reduce((s,m)=>s+Number(m.cost||0),0);
      return `<div class="day-card">
        <div class="day-header">
          <span class="day-name">${day}</span>
          ${dayTotal>0 ? `<span style="font-family:var(--font-mono);font-size:0.62rem;color:var(--teal-light);">${fmt.currency(dayTotal)}</span>` : ''}
        </div>
        <div class="day-body">${slots}</div>
      </div>`;
    }).join('');
  }

  function openAddMeal(day, slot) {
    document.getElementById('meal-day').value        = day;
    document.getElementById('meal-slot').value       = slot;
    document.getElementById('meal-slot-label').textContent = `${day} · ${slot}`;
    document.getElementById('meal-name').value       = '';
    document.getElementById('meal-cost').value       = '';
    openModal('add-meal-modal');
  }

  function saveMeal() {
    const name = document.getElementById('meal-name').value.trim();
    if (!name) { toast('Please enter a meal name'); return; }
    Meals.addMeal({
      day:  document.getElementById('meal-day').value,
      slot: document.getElementById('meal-slot').value,
      name,
      cost: document.getElementById('meal-cost').value,
    });
    closeModal('add-meal-modal');
    renderWeekly();
    toast('Meal added!');
  }

  function removeMealEntry(id) {
    Meals.removeMeal(id);
    renderWeekly();
  }

  function renderGrocery() {
    const list = Meals.groceryList();
    document.getElementById('grocery-count').textContent = `${list.length} item${list.length!==1?'s':''}`;

    const total = list.reduce((s,g)=>s+Number(g.price||0),0);
    const el = document.getElementById('grocery-list');

    if (!list.length) {
      el.innerHTML = `<div style="text-align:center;padding:40px 0;font-family:var(--font-mono);font-size:0.68rem;color:var(--text-light3);">Your grocery list is empty.<br/>Tap + to add items before you shop.</div>`;
      return;
    }

    el.innerHTML = list.map(g => `
      <div class="grocery-item">
        <div class="grocery-check ${g.checked?'checked':''}" onclick="toggleGrocery('${g.id}')">
          ${g.checked?'✓':''}
        </div>
        <span class="grocery-name ${g.checked?'checked':''}">${g.name}</span>
        ${g.qty  ? `<span class="grocery-qty">${g.qty}</span>` : ''}
        ${g.price ? `<span style="font-family:var(--font-mono);font-size:0.68rem;color:var(--teal-light);">R${g.price}</span>` : ''}
        <button onclick="removeGrocery('${g.id}')" style="background:none;border:none;color:var(--text-light3);cursor:pointer;font-size:0.8rem;">✕</button>
      </div>
    `).join('') + (total>0 ? `
      <div style="padding:12px 0;display:flex;justify-content:space-between;border-top:1px solid var(--dark-border);">
        <span style="font-family:var(--font-mono);font-size:0.65rem;color:var(--text-light3);">Estimated total</span>
        <span style="font-family:var(--font-display);font-weight:700;color:var(--teal-light);">${fmt.currency(total)}</span>
      </div>` : '');
  }

  function toggleGrocery(id) { Meals.toggleGrocery(id); renderGrocery(); }

  function removeGrocery(id) {
    Meals.setGrocery(Meals.groceryList().filter(g=>g.id!==id));
    renderGrocery();
  }

  function clearChecked() {
    Meals.setGrocery(Meals.groceryList().filter(g=>!g.checked));
    renderGrocery();
    toast('Checked items removed.');
  }

  function saveGroceryItem() {
    const name = document.getElementById('gr-item').value.trim();
    if (!name) { toast('Please enter an item'); return; }
    Meals.addGroceryItem({
      name,
      qty:   document.getElementById('gr-qty').value.trim(),
      price: document.getElementById('gr-price').value,
    });
    document.getElementById('gr-item').value  = '';
    document.getElementById('gr-qty').value   = '';
    document.getElementById('gr-price').value = '';
    closeModal('add-grocery-modal');
    renderGrocery();
    toast('Added to grocery list!');
  }

  function renderRecipes() {
    const el = document.getElementById('recipes-list');
    el.innerHTML = STUDENT_RECIPES.map(r => `
      <div class="recipe-card">
        <div class="recipe-name">${r.name}</div>
        <div class="recipe-meta">
          <span class="badge badge-teal">${r.cost}</span>
          <span class="badge badge-coral">⏱ ${r.time}</span>
          <span class="badge badge-amber">👥 ${r.servings}</span>
          ${r.tags.map(t=>`<span class="badge badge-purple">${t}</span>`).join('')}
        </div>
        <div class="recipe-steps">${r.steps}</div>
        <button class="btn btn-outline-light btn-sm" style="margin-top:12px;"
          onclick="addRecipeToGrocery(${JSON.stringify(r.name).replace(/'/g, "&#39;")})">
          🛒 Add ingredients to list
        </button>
      </div>
    `).join('');
  }

  function addRecipeToGrocery(recipeName) {
    toast(`Tip: Manually add ingredients from the recipe to your grocery list.`);
  }

  async function generateRecipe() {
    const ingredients = document.getElementById('ai-ingredients').value.trim();
    if (!ingredients) { toast('Tell us what you have first!'); return; }

    const output = document.getElementById('ai-recipe-output');
    output.style.display = 'block';
    output.innerHTML = `<div style="display:flex;align-items:center;gap:8px;color:var(--teal-light);font-family:var(--font-mono);font-size:0.7rem;">
      <span>✨</span> Generating recipe...
    </div>`;

    const system = `You are a creative student food advisor for South African university students. Given available ingredients, create one simple, filling meal. Format: Name, Cost estimate (in rands), Time, then numbered steps. Keep it practical, budget-conscious (under R50), and something a student with minimal kitchen equipment can make. Add 1 pro tip at the end.`;

    const result = await callAI(system, `I have: ${ingredients}`, 300);
    output.textContent = result || `Here's a quick idea with ${ingredients}:\n\nFry any protein you have (egg, tuna, beans) with onion and garlic. Season well. Serve over rice or with bread. Simple, cheap, and filling.\n\nPro tip: A R5 packet of mixed spice transforms almost any meal.`;
  }

  renderWeekly();
</script>
</body>
</html>
